name: Publish Chrome extension

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: current
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Package extension
        run: npm run build:bundle

      - name: Publish to Chrome Web Store
        uses: puzzlers-labs/chrome-webstore-publish@010fc578dea8e3a05e15af75b836be821ee9ab74 # v1.2.5
        with:
          mode: publish
          extension_id: ${{ secrets.CHROME_EXTENSION_ID }}
          zip_file_path: ./dist/github-tabs.zip
          client_id: ${{ secrets.CHROME_EXTENSION_CLIENT_ID }}
          client_secret: ${{ secrets.CHROME_EXTENSION_CLIENT_SECRET }}
          refresh_token: ${{ secrets.CHROME_EXTENSION_REFRESH_TOKEN }}
          publish_target: public
