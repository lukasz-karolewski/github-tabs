name: Publish Chrome extension

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Package extension
        run: |
          rm -rf dist
          mkdir -p dist
          zip -r dist/github-tabs.zip manifest.json background.js consolidate.js icons

      - name: Publish to Chrome Web Store
        uses: puzzlers-labs/chrome-webstore-publish@v1
        with:
          mode: publish
          extension_id: ${{ secrets.CHROME_EXTENSION_ID }}
          zip_file_path: ./dist/github-tabs.zip
          client_id: ${{ secrets.CHROME_EXTENSION_CLIENT_ID }}
          client_secret: ${{ secrets.CHROME_EXTENSION_CLIENT_SECRET }}
          refresh_token: ${{ secrets.CHROME_EXTENSION_REFRESH_TOKEN }}
          publish_target: public
